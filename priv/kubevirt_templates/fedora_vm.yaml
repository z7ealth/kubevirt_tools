# Template from ~/Projects/kubevirt/fedora_vm.yaml — CPU/RAM/names/volume claim overridden by seed script.
# Add ssh_authorized_keys via VM_SSH_KEY when running the script (optional).
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  labels:
    kubevirt.io/os: linux
  name: fedora-vm
  namespace: virt
spec:
  runStrategy: Always
  template:
    spec:
      domain:
        cpu:
          cores: 2
        devices:
          disks:
          - disk:
              bus: virtio
            name: disk0
          - cdrom:
              bus: sata
              readonly: true
            name: cloudinitdisk
        machine:
          type: q35
        resources:
          requests:
            memory: 1024M
      volumes:
      - name: disk0
        persistentVolumeClaim:
          claimName: fedora
      - cloudInitNoCloud:
          userData: |
            #cloud-config
            hostname: fedora-vm
            ssh_pwauth: True
            disable_root: false
        name: cloudinitdisk
